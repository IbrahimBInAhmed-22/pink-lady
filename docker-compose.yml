services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinklady
      POSTGRES_PASSWORD: pinklady
      POSTGRES_DB: pinklady
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinklady -d pinklady"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://pinklady:pinklady@db:5432/pinklady
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
